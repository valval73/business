<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { background: #F6F1E9; font-family: 'Georgia', serif; color: #0A0A0A; min-height: 100vh; }

/* HEADER */
.header { padding: 20px 20px 0; display: flex; align-items: center; justify-content: space-between; }
.brand { font-size: 22px; font-weight: 700; letter-spacing: 6px; color: #0A0A0A; }
.brand em { color: #C8A84A; font-style: normal; }
.header-sub { font-size: 9px; letter-spacing: 2px; color: #999; margin-top: 2px; font-family: monospace; }
.date-badge { font-size: 9px; letter-spacing: 1px; color: #999; font-family: monospace; background: #ede8de; padding: 4px 10px; border-radius: 4px; border: 1px solid #d4c9b0; }

/* FILTRES */
.filtres { padding: 16px 20px; display: flex; gap: 8px; flex-wrap: wrap; border-bottom: 1px solid #d4c9b0; }
.fpill { font-size: 9px; letter-spacing: 2px; padding: 6px 14px; border-radius: 20px; border: 1px solid #d4c9b0; cursor: pointer; background: #ede8de; color: #666; font-family: monospace; }
.fpill.on { background: #C8A84A; color: #000; border-color: #C8A84A; }
.meta-bar { padding: 8px 20px; font-size: 9px; letter-spacing: 2px; color: #999; font-family: monospace; display: flex; justify-content: space-between; }

/* LISTE */
#liste-content { padding: 12px 20px; }
.spinner-wrap { text-align: center; padding: 60px; color: #999; font-size: 11px; letter-spacing: 2px; font-family: monospace; }
.spinner { width: 30px; height: 30px; border: 2px solid #d4c9b0; border-top-color: #C8A84A; border-radius: 50%; animation: spin 0.8s linear infinite; margin: 0 auto 12px; }
@keyframes spin { to { transform: rotate(360deg); } }

.row { display: flex; align-items: center; gap: 12px; padding: 14px 16px; background: #fff; border: 1px solid #e8e2d6; border-radius: 10px; margin-bottom: 8px; cursor: pointer; transition: box-shadow 0.15s; }
.row:hover { box-shadow: 0 4px 16px rgba(0,0,0,0.08); }
.row-score { font-size: 22px; font-weight: 700; min-width: 44px; text-align: center; font-family: monospace; }
.row-info { flex: 1; }
.row-ticker { font-size: 15px; font-weight: 700; letter-spacing: 1px; }
.row-name { font-size: 11px; color: #888; margin: 2px 0; }
.row-tags { display: flex; flex-wrap: wrap; gap: 4px; margin-top: 4px; }
.tag { font-size: 8px; letter-spacing: 1px; padding: 2px 8px; border-radius: 10px; border: 1px solid; font-family: monospace; }
.row-bars { display: flex; flex-direction: column; gap: 3px; min-width: 80px; }
.bar-row { display: flex; align-items: center; gap: 4px; }
.bar-lbl { font-size: 8px; color: #999; font-family: monospace; width: 12px; }
.bar-track { flex: 1; height: 4px; background: #ede8de; border-radius: 2px; }
.bar-fill { height: 100%; border-radius: 2px; }
.row-arrow { color: #C8A84A; font-size: 18px; }

/* VUE FICHE */
#vue-fiche { display: none; padding: 20px; max-width: 700px; margin: 0 auto; }
.btn-retour { background: transparent; border: none; color: #C8A84A; font-size: 9px; letter-spacing: 2px; cursor: pointer; font-family: monospace; margin-bottom: 20px; display: flex; align-items: center; gap: 6px; }
.fiche-hero { background: #fff; border: 1px solid #e8e2d6; border-radius: 12px; padding: 24px; margin-bottom: 12px; }
.fiche-top { display: flex; gap: 20px; align-items: flex-start; margin-bottom: 20px; }
.score-ring { position: relative; width: 80px; height: 80px; flex-shrink: 0; }
.score-ring svg { transform: rotate(-90deg); }
.score-inner { position: absolute; inset: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; }
.score-num { font-size: 26px; font-weight: 700; line-height: 1; font-family: monospace; }
.score-denom { font-size: 8px; color: #999; font-family: monospace; }
.fiche-ticker { font-size: 32px; font-weight: 700; letter-spacing: -1px; }
.fiche-name { font-size: 13px; color: #888; margin: 4px 0 10px; }
.fiche-tags { display: flex; flex-wrap: wrap; gap: 5px; }
.price-row { display: flex; align-items: baseline; gap: 8px; margin-top: 16px; padding-top: 16px; border-top: 1px solid #e8e2d6; }
.price-main { font-size: 28px; font-weight: 700; font-family: monospace; }
.price-curr { font-size: 11px; color: #999; font-family: monospace; }
.price-mom { margin-left: auto; font-size: 10px; padding: 3px 10px; border-radius: 6px; font-family: monospace; }

/* PILIERS */
.piliers { display: grid; grid-template-columns: repeat(5, 1fr); gap: 8px; margin-bottom: 12px; }
.pilier { background: #fff; border: 1px solid #e8e2d6; border-radius: 8px; padding: 12px 8px; text-align: center; }
.pilier-lbl { font-size: 8px; letter-spacing: 2px; color: #999; font-family: monospace; }
.pilier-val { font-size: 20px; font-weight: 700; font-family: monospace; margin: 4px 0 2px; }
.pilier-name { font-size: 8px; color: #999; }

/* METRIQUES */
.section { background: #fff; border: 1px solid #e8e2d6; border-radius: 12px; padding: 20px; margin-bottom: 12px; }
.section-title { font-size: 9px; letter-spacing: 3px; color: #C8A84A; font-family: monospace; margin-bottom: 14px; text-transform: uppercase; }
.metrics-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
.metric { }
.metric-lbl { font-size: 9px; color: #999; font-family: monospace; letter-spacing: 1px; }
.metric-val { font-size: 14px; font-weight: 600; font-family: monospace; }
.metric-val.good { color: #1A6B3C; }
.metric-val.bad { color: #8B1A1A; }
.thèse { font-size: 12px; line-height: 1.7; color: #444; }
.sizing-box { background: #F6F1E9; border: 1px solid #d4c9b0; border-radius: 8px; padding: 14px; margin-top: 12px; font-size: 11px; color: #666; line-height: 1.6; }

/* LEXIQUE */
.btn-lex { background: transparent; border: 1px solid #d4c9b0; color: #C8A84A; padding: 6px 14px; font-size: 9px; letter-spacing: 2px; cursor: pointer; font-family: monospace; border-radius: 4px; }
#lex-overlay { display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: #F6F1E9; overflow-y: auto; z-index: 9999; padding: 24px 20px 60px; }
.lex-inner { max-width: 640px; margin: 0 auto; }
.lex-cat-btn { padding: 4px 12px; border: 1px solid #d4c9b0; border-radius: 20px; font-size: 9px; letter-spacing: 2px; cursor: pointer; background: #ede8de; color: #666; margin: 3px; font-family: monospace; }

.lex-item { background: #fff; border: 1px solid #e8e2d6; border-radius: 8px; padding: 14px 16px; margin-bottom: 8px; }
.lex-term { font-size: 13px; font-weight: 700; margin-bottom: 4px; }
.lex-def { font-size: 12px; color: #666; line-height: 1.6; }
.lex-badge { display: inline-block; font-size: 8px; letter-spacing: 1px; padding: 2px 8px; border-radius: 10px; margin-bottom: 6px; font-family: monospace; }

// ── ÉTAT ─────────────────────────────────────────────────────────────────────
var ALL_STOCKS = [];
var CURRENT_FILTRE = 'T';

// ── COULEURS ─────────────────────────────────────────────────────────────────
function scoreColor(s) {
  if (s >= 65) return '#C8A84A';
  if (s >= 55) return '#3b82f6';
  if (s >= 45) return '#888';
  return '#8B1A1A';
}
function scoreLabel(s) {
  if (s >= 65) return 'PÉPITE';
  if (s >= 55) return 'CANDIDAT';
  if (s >= 45) return 'SURVEILLER';
  return 'ÉVITER';
}
var SC = {Tech:'#3b82f6',Sante:'#10b981',Finance:'#8b5cf6',Industrie:'#f59e0b',
  Conso:'#ec4899',Energie:'#f97316',Materiaux:'#06b6d4',Telecom:'#6366f1',
  Utilities:'#14b8a6',Immo:'#84cc16',Autre:'#64748b'};

// ── FILTRES ───────────────────────────────────────────────────────────────────
function setFiltre(f, el) {
  CURRENT_FILTRE = f;
  document.querySelectorAll('.fpill').forEach(function(b){ b.classList.remove('on'); });
  el.classList.add('on');
  renderListe();
}

function filtrerStocks() {
  return ALL_STOCKS.filter(function(s) {
    var sc = parseFloat(s.Score) || 0;
    var isVT = s.value_trap === true || s.value_trap === 'true' || s.value_trap === 'True';
    if (CURRENT_FILTRE === 'P') return sc >= 65;
    if (CURRENT_FILTRE === 'C') return sc >= 55 && sc < 65;
    if (CURRENT_FILTRE === 'H') return s.alerte_revision === 'FORTE HAUSSE ATTENDUE';
    if (CURRENT_FILTRE === 'R') return s.alerte_revision === 'REVISION POSITIVE';
    if (CURRENT_FILTRE === 'V') return isVT;
    return sc >= 45; // TOUS
  });
}

// ── RENDU LISTE ───────────────────────────────────────────────────────────────
function renderListe() {
  var list = filtrerStocks();
  var el = document.getElementById('liste-content');
  if (!list.length) {
    el.innerHTML = '<div class="spinner-wrap">Aucun résultat pour ce filtre.</div>';
    return;
  }
  el.innerHTML = list.map(function(s) {
    var sc = parseFloat(s.Score) || 0;
    var gc = scoreColor(sc);
    var sc2 = SC[s.secteur] || '#64748b';
    var isVT = s.value_trap === true || s.value_trap === 'true' || s.value_trap === 'True';
    var alerte = '';
    if (s.alerte_revision === 'FORTE HAUSSE ATTENDUE')
      alerte = '<span class="tag" style="color:#1A6B3C;border-color:rgba(26,107,60,0.3);background:rgba(26,107,60,0.08)">▲ FORTE HAUSSE</span>';
    else if (s.alerte_revision === 'REVISION POSITIVE')
      alerte = '<span class="tag" style="color:#1A6B3C;border-color:rgba(26,107,60,0.2);background:rgba(26,107,60,0.06)">↑ RÉVISION+</span>';
    else if (s.alerte_revision && s.alerte_revision.indexOf('NEGATIVE') >= 0)
      alerte = '<span class="tag" style="color:#8B4A00;border-color:rgba(139,74,0,0.2);background:rgba(139,74,0,0.06)">↓ RÉVISION-</span>';
    var vtag = isVT ? '<span class="tag" style="color:#8B1A1A;border-color:rgba(139,26,26,0.2);background:rgba(139,26,26,0.06)">⚠ VALUE TRAP</span>' : '';
    var bars = [['Q', s.Q, '#8b5cf6'], ['V', s.V, '#3b82f6'], ['M', s.M, '#C8A84A']];
    return '<div class="row" onclick="ouvrirFiche(\'' + s.Ticker + '\')">' +
      '<div class="row-score" style="color:' + gc + '">' + Math.round(sc) + '</div>' +
      '<div class="row-info">' +
        '<div class="row-ticker">' + s.Ticker + '</div>' +
        '<div class="row-name">' + (s.name || '') + '</div>' +
        '<div class="row-tags">' +
          '<span class="tag" style="color:' + gc + ';border-color:' + gc + '44;background:' + gc + '11">' + scoreLabel(sc) + '</span>' +
          '<span class="tag" style="color:' + sc2 + ';border-color:' + sc2 + '44;background:' + sc2 + '11">' + (s.secteur || '') + '</span>' +
          (s.prix ? '<span class="tag" style="color:#888;border-color:#d4c9b0">' + parseFloat(s.prix).toFixed(2) + ' ' + (s.devise || '') + '</span>' : '') +
          alerte + vtag +
        '</div>' +
      '</div>' +
      '<div class="row-bars">' +
        bars.map(function(b) {
          var p = Math.min(100, Math.max(0, parseFloat(b[1]) || 0));
          return '<div class="bar-row"><span class="bar-lbl">' + b[0] + '</span><div class="bar-track"><div class="bar-fill" style="width:' + p + '%;background:' + b[2] + '"></div></div></div>';
        }).join('') +
      '</div>' +
      '<div class="row-arrow">›</div>' +
    '</div>';
  }).join('');
}

// ── FICHE DÉTAIL ──────────────────────────────────────────────────────────────
function ouvrirFiche(ticker) {
  var s = ALL_STOCKS.find(function(x){ return x.Ticker === ticker; });
  if (!s) return;
  document.getElementById('vue-liste').style.display = 'none';
  document.getElementById('vue-fiche').style.display = 'block';
  window.scrollTo(0, 0);

  var sc = parseFloat(s.Score) || 0;
  var gc = scoreColor(sc);
  var r = Math.round(sc / 100 * 219);
  var circ = 2 * Math.PI * 35;
  var dash = (sc / 100) * circ;

  function fmt(v, dec) {
    if (v === null || v === undefined || v === '' || v === 'N/A') return '—';
    var n = parseFloat(v);
    if (isNaN(n)) return v;
    return n.toFixed(dec !== undefined ? dec : 1);
  }
  function fmtPct(v) { return fmt(v, 1) === '—' ? '—' : fmt(v, 1) + '%'; }
  function cls(v, goodDir) {
    var n = parseFloat(v);
    if (isNaN(n)) return '';
    if (goodDir === '>0') return n > 0 ? 'good' : 'bad';
    if (goodDir === '<0') return n < 0 ? 'good' : 'bad';
    return '';
  }

  var momVal = parseFloat(s.mom) || 0;
  var momClass = momVal >= 0 ? 'mom-pos' : 'mom-neg';
  var momSign = momVal >= 0 ? '+' : '';

  var isVT = s.value_trap === true || s.value_trap === 'true' || s.value_trap === 'True';

  var html = '<div class="fiche-hero">' +
    '<div class="fiche-top">' +
      '<div class="score-ring">' +
        '<svg width="80" height="80" viewBox="0 0 80 80">' +
          '<circle cx="40" cy="40" r="35" fill="none" stroke="#ede8de" stroke-width="6"/>' +
          '<circle cx="40" cy="40" r="35" fill="none" stroke="' + gc + '" stroke-width="6" stroke-dasharray="' + dash + ' ' + circ + '" stroke-linecap="round"/>' +
        '</svg>' +
        '<div class="score-inner"><div class="score-num" style="color:' + gc + '">' + Math.round(sc) + '</div><div class="score-denom">/100</div></div>' +
      '</div>' +
      '<div>' +
        '<div class="fiche-ticker">' + s.Ticker + '</div>' +
        '<div class="fiche-name">' + (s.name || '') + '</div>' +
        '<div class="fiche-tags">' +
          '<span class="tag" style="color:' + gc + ';border-color:' + gc + '44;background:' + gc + '11">' + scoreLabel(sc) + '</span>' +
          '<span class="tag" style="color:#888;border-color:#d4c9b0">' + (s.secteur || '') + '</span>' +
          '<span class="tag" style="color:#888;border-color:#d4c9b0">' + (s.cap || '') + ' CAP</span>' +
          (isVT ? '<span class="tag" style="color:#8B1A1A;border-color:rgba(139,26,26,0.3);background:rgba(139,26,26,0.06)">⚠ VALUE TRAP</span>' : '') +
        '</div>' +
      '</div>' +
    '</div>' +
    '<div class="price-row">' +
      '<div class="price-main">' + fmt(s.prix, 2) + '</div>' +
      '<div class="price-curr">' + (s.devise || 'EUR') + '</div>' +
      '<div class="price-mom" style="background:' + (momVal>=0?'rgba(26,107,60,0.08)':'rgba(139,26,26,0.08)') + ';color:' + (momVal>=0?'#1A6B3C':'#8B1A1A') + '">' + momSign + fmt(s.mom, 1) + '% 12M</div>' +
    '</div>' +
  '</div>';

  // Piliers
  html += '<div class="piliers">';
  [['Q','QUALITÉ','#8b5cf6'],['V','VALEUR','#3b82f6'],['M','MOMENTUM','#C8A84A'],['S','SOLIDITÉ','#10b981'],['F','FORWARD','#f59e0b']].forEach(function(p) {
    var v = parseFloat(s[p[0]]) || 0;
    html += '<div class="pilier">' +
      '<div class="pilier-lbl">' + p[0] + '</div>' +
      '<div class="pilier-val" style="color:' + p[2] + '">' + Math.round(v) + '</div>' +
      '<div class="pilier-name">' + p[1] + '</div>' +
    '</div>';
  });
  html += '</div>';

  // Métriques
  html += '<div class="section"><div class="section-title">FONDAMENTAUX</div><div class="metrics-grid">';
  var metrics = [
    ['ROE', fmtPct(s.roe), cls(s.roe, '>0')],
    ['ROA', fmtPct(s.roa), cls(s.roa, '>0')],
    ['ROIC', fmtPct(s.roic), cls(s.roic, '>0')],
    ['Marge brute', fmtPct(s.gm), cls(s.gm, '>0')],
    ['Marge nette', fmtPct(s.pm), cls(s.pm, '>0')],
    ['Croiss. CA', fmtPct(s.rg), cls(s.rg, '>0')],
    ['EPS growth', fmtPct(s.epsg), cls(s.epsg, '>0')],
    ['P/E', fmt(s.pe, 1), ''],
    ['FWD P/E', fmt(s.fpe, 1), ''],
    ['EV/EBITDA', fmt(s.ev_ebitda, 1), ''],
    ['FCF Yield', fmtPct(s.fcy), cls(s.fcy, '>0')],
    ['Dividende', fmtPct(s.div_yield), ''],
    ['Dette/EBITDA', fmt(s.debt_eb, 1), ''],
    ['Piotroski', fmt(s.pio, 0), ''],
    ['Beta', fmt(s.beta, 2), ''],
    ['Dist. 52S', fmtPct(s.dist_52s), ''],
  ];
  metrics.forEach(function(m) {
    html += '<div class="metric"><div class="metric-lbl">' + m[0] + '</div><div class="metric-val ' + m[2] + '">' + m[1] + '</div></div>';
  });
  html += '</div></div>';

  // Sizing
  if (s.sizing) {
    html += '<div class="section"><div class="section-title">SIZING</div><div class="sizing-box">' + s.sizing + '</div></div>';
  }

  document.getElementById('fiche-content').innerHTML = html;
}

function retourListe() {
  document.getElementById('vue-fiche').style.display = 'none';
  document.getElementById('vue-liste').style.display = 'block';
}

// ── LEXIQUE ───────────────────────────────────────────────────────────────────
var LEX = [
  {c:'qual',t:'ROIC',d:'Return On Invested Capital. NOPAT / capital investi. ≥10% = valeur créée, ≥20% = moat structurel fort.'},
  {c:'qual',t:'ROE',d:'Bénéfice net / fonds propres. ROE >15% avec faible dette = qualité durable.'},
  {c:'qual',t:'Marge brute',d:'(CA - coûts variables) / CA. >50% = avantage concurrentiel structurel.'},
  {c:'qual',t:'Piotroski F-Score',d:'Score 0-9 sur critères comptables. ≥7 = bilan sain. ≤3 = signaux négatifs.'},
  {c:'qual',t:'Score Q — Qualité',d:'Pilier qualitatif (0-100) : ROE, marge brute, stabilité des marges, croissance CA.'},
  {c:'val',t:'EV/EBITDA',d:'Valeur entreprise / EBITDA. Indépendant de la structure financière. <10x = potentiellement sous-valorisé.'},
  {c:'val',t:'P/E — PER',d:'Cours / Bénéfice par action. Toujours comparer au secteur et à l\'historique.'},
  {c:'val',t:'FWD P/E',d:'PER sur bénéfices attendus 12 mois. Révisions hausse = signal d\'entrée.'},
  {c:'val',t:'FCF Yield',d:'Free Cash Flow / capitalisation. ≥5% = valorisation attractive.'},
  {c:'val',t:'Score V — Valeur',d:'Pilier valorisation (0-100). Score élevé = titre peu cher sur plusieurs métriques.'},
  {c:'mom',t:'Momentum 12M',d:'Performance sur 12 mois. Facteur prouvé : les gagnants récents tendent à surperformer.'},
  {c:'mom',t:'Distance 52S High',d:'Écart cours / plus haut 52 semaines. Proche 0% = force relative.'},
  {c:'mom',t:'Révision proxy',d:'Proxy révisions analystes. >1.05 = révisions haussières probables.'},
  {c:'mom',t:'Score M — Momentum',d:'Pilier momentum (0-100) : momentum 12M + distance 52S + proxy révisions.'},
  {c:'sol',t:'Dette/EBITDA',d:'Années d\'EBITDA pour rembourser la dette nette. <2x = sain. >4x = risque élevé.'},
  {c:'sol',t:'Score S — Solidité',d:'Pilier solidité (0-100) : endettement, couverture intérêts, qualité bilan.'},
  {c:'sol',t:'Score F — Forward',d:'Pilier prospectif (0-100) : croissance CA attendue, révisions analystes, guidance.'},
  {c:'gen',t:'Score composite',d:'Moyenne pondérée Q+V+M+S+F (0-100). ≥65 = Pépite. 55-64 = Candidat. <55 = Surveiller.'},
  {c:'gen',t:'Sizing',d:'Taille position en % portefeuille. Score >65 : 5-7%. Score 55-65 : 3-5%.'},
  {c:'gen',t:'VALUE TRAP',d:'Titre bon marché en apparence mais fondamentaux qui se dégradent.'},
  {c:'gen',t:'FORTE HAUSSE',d:'Momentum >25% sur 12M. Vérifier que la valorisation reste raisonnable.'},
  {c:'gen',t:'REVISION+',d:'Révisions haussières estimations analystes. L\'un des facteurs les plus prédictifs de surperformance.'},
  {c:'gen',t:'PEA',d:'Plan Épargne en Actions. Exonération impôt plus-values après 5 ans. Plafond 150 000€.'},
];
var LBL = {qual:'QUALITÉ',val:'VALEUR',mom:'MOMENTUM',sol:'SOLIDITÉ',gen:'GÉNÉRAL'};
var BG = {qual:'#1a3a1a',val:'#1a2a3a',mom:'#3a2a1a',sol:'#2a1a3a',gen:'#2a2a2a'};
var TC = {qual:'#6fcf6f',val:'#6fa8cf',mom:'#cfaa6f',sol:'#a86fcf',gen:'#aaa'};

function openLex() { document.getElementById('lex-overlay').style.display = 'block'; renderLex('all'); }
function closeLex() { document.getElementById('lex-overlay').style.display = 'none'; }
function renderLex(cat) {
  var data = cat === 'all' ? LEX : LEX.filter(function(x){ return x.c === cat; });
  document.getElementById('lex-grid').innerHTML = data.map(function(x) {
    return '<div class="lex-item">' +
      '<span class="lex-badge" style="background:' + BG[x.c] + ';color:' + TC[x.c] + '">' + LBL[x.c] + '</span>' +
      '<div class="lex-term">' + x.t + '</div>' +
      '<div class="lex-def">' + x.d + '</div>' +
    '</div>';
  }).join('');
}
function filtLex(cat, el) {
  document.querySelectorAll('.lex-cat-btn').forEach(function(b){ b.classList.remove('on'); });
  el.classList.add('on');
  renderLex(cat);
}

// ── INIT ──────────────────────────────────────────────────────────────────────
ALL_STOCKS = Array.isArray(INLINE_DATA) ? INLINE_DATA : [];
ALL_STOCKS.sort(function(a, b){ return (parseFloat(b.Score)||0) - (parseFloat(a.Score)||0); });

var cands = ALL_STOCKS.filter(function(s){ return (parseFloat(s.Score)||0) >= 55; }).length;
var pepites = ALL_STOCKS.filter(function(s){ return (parseFloat(s.Score)||0) >= 65; }).length;
document.getElementById('liste-meta').textContent = cands + ' CANDIDATS · ' + pepites + ' PÉPITES · ' + ALL_STOCKS.length + ' TOTAL';
var lastDate = ALL_STOCKS[0] ? (ALL_STOCKS[0].Date_Analyse || '') : '';
document.getElementById('liste-date').textContent = lastDate;

var params = new URLSearchParams(window.location.search);
var tickerParam = params.get('ticker');
if (tickerParam) {
  var found = ALL_STOCKS.find(function(s){ return s.Ticker === tickerParam; });
  if (found) { ouvrirFiche(tickerParam); } else { renderListe(); }
} else {
  renderListe();
}
</script>
